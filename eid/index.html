<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Eid Mubarak</title>

  <style>
    body {
      margin: 0;
      padding: 0;
      background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
      font-family: Arial, sans-serif;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .card {
      text-align: center;
      background: rgba(255, 255, 255, 0.1);
      padding: 40px;
      border-radius: 20px;
      box-shadow: 0 0 20px rgba(0,0,0,0.5);
      backdrop-filter: blur(10px);
    }

    h1 {
      font-size: 40px;
      color: gold;
      margin-bottom: 10px;
    }

    p {
      font-size: 18px;
      margin-top: 10px;
    }

    .moon {
      font-size: 50px;
      margin-bottom: 15px;
    }

    .name {
      color: #00ffd5;
      font-weight: bold;
    }
    .eid-btn {
  background: linear-gradient(45deg, #ffcc00, #ff4d4d, #00ffd5, #4d79ff);
  background-size: 300% 300%;
  color: white;
  border: none;
  padding: 12px 28px;
  font-size: 17px;
  border-radius: 30px;
  cursor: pointer;
  font-weight: bold;
  transition: 0.3s;
  animation: gradientMove 4s ease infinite;
  box-shadow: 0 0 15px rgba(255, 204, 0, 0.6);
}
  </style>
</head>

<body>

  <div class="card">
    <div class="moon">🌙✨</div>

    <h1>Eid Mubarak</h1>

    <p> <span class="name">kochi</span> 💖</p>

    <p>
      May your life be filled with happiness, peace, and endless blessings.  
      Stay happy always 😊
    </p>
    <p>No matter what, I’m always with you.💖</p>
    <p>~   Jahid</p>
  
<button onclick="startMusic()" class="eid-btn">
  🌙 Play✨
</button>

<audio id="bgm" loop>
  <source src="Bhar do jholi.mp3" type="audio/mpeg">
</audio>

<script>
function startMusic() {
  let audio = document.getElementById("bgm");

  audio.volume = 0;
  audio.play();

  let vol = 0;
  let fade = setInterval(() => {
    if (vol < 1) {
      vol += 0.02;
      audio.volume = vol;
    } else {
      clearInterval(fade);
    }
  }, 200);
}
</script>
</body>

</html>
